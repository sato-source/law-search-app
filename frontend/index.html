<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>法令検索</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
      line-height: 1.8;
      background: #fafafa;
    }
    input {
      width: min(380px, 90vw);
      padding: 8px;
      font-size: 14px;
    }
    button {
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    ul {
      padding-left: 20px;
    }
    li {
      cursor: pointer;
      margin: 6px 0;
      padding: 4px;
    }
    li:hover {
      background: #f0f0f0;
    }
    pre {
      background: white;
      padding: 18px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      border: 1px solid #ddd;
    }
    #out {
      max-height: 60vh;
      overflow: auto;
    }
    .status {
      margin-left: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>法令検索</h1>

  <div>
    <input id="q" placeholder="例：労働基準法">
    <button id="btn">検索</button>
    <span class="status" id="status">準備OK</span>
  </div>

  <h2 style="margin-top:28px;">検索結果（クリックして本文取得）</h2>
  <ul id="list"></ul>

  <h2 style="margin-top:28px;">条文表示</h2>
  <pre id="out">ここに条文が表示されます</pre>

  <script>
    const qInput = document.getElementById("q");
    const btn = document.getElementById("btn");
    const list = document.getElementById("list");
    const out = document.getElementById("out");
    const statusEl = document.getElementById("status");

    btn.onclick = search;
    qInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") search();
    });

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function search() {
      try {
        const q = qInput.value.trim();

        list.innerHTML = "";
        out.textContent = "ここに条文が表示されます";

        if (!q) {
          setStatus("検索語を入力してください");
          return;
        }

        setStatus("検索中");

        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || `search failed: ${res.status}`);
        }

        const laws = data.laws || [];

        if (laws.length === 0) {
          const li = document.createElement("li");
          li.textContent = "候補が見つかりませんでした";
          list.appendChild(li);
          setStatus("候補なし");
          return;
        }

        laws.forEach((law) => {
          const title = law.lawName || "タイトル不明";
          const id = law.lawId || "";

          const li = document.createElement("li");
          li.textContent = `${title} [${id}]`;
          li.onclick = () => loadLaw(id, title);
          list.appendChild(li);
        });

        setStatus(`表示OK（${laws.length}件）`);

      } catch (e) {
        console.error(e);
        setStatus("検索エラー");
        out.textContent = "検索中にエラーが発生しました。\n\n" + String(e);
      }
    }

    async function loadLaw(id, title) {
      try {
        if (!id) {
          out.textContent = "法令IDがありません";
          return;
        }

        setStatus("本文取得中");
        out.textContent = "本文を取得しています...";

        const res = await fetch(`/api/law?id=${encodeURIComponent(id)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || `law failed: ${res.status}`);
        }

        const xml = data.xml || "本文が見つかりません";
        out.textContent = `${title}\n\n${xml}`;

        setStatus("本文表示OK");

      } catch (e) {
        console.error(e);
        setStatus("本文取得エラー");
        out.textContent = "本文取得中にエラーが発生しました。\n\n" + String(e);
      }
    }
  </script>
</body>
</html>
