<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>法令検索</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a5fb4">

<style>
body{font-family:sans-serif;margin:24px;line-height:1.8;background:#fafafa;}
input{width:min(380px,90vw);padding:8px;font-size:14px;}
button{padding:8px 14px;font-size:14px;cursor:pointer;}
li{cursor:pointer;margin:6px 0;padding:4px;}
li:hover{background:#f0f0f0;}
pre{background:white;padding:18px;border-radius:6px;white-space:pre-wrap;font-size:14px;border:1px solid #ddd;}
#out{max-height:60vh;overflow:auto;}
.status{margin-left:10px;font-size:12px;color:#666;}
</style>
</head>

<body>
<h1>法令検索</h1>

<div>
  <input id="q" placeholder="例：労働基準法">
  <button id="btn">検索</button>
  <span class="status" id="status">準備OK</span>
</div>

<h2>検索結果（クリックして本文取得）</h2>
<ul id="list"></ul>

<h2>条文表示</h2>
<pre id="out">ここに条文が表示されます</pre>

<script>
// ★RenderのURLが出たらここを置き換えます（今は仮）
const backend = ""; // 同一オリジン（= vercel.app）にする
// もしくは const backend = location.origin;

document.getElementById("btn").onclick=search;
document.getElementById("q").addEventListener("keydown",e=>{ if(e.key==="Enter")search(); });
function setStatus(t){ document.getElementById("status").textContent=t; }

async function search(){
  const q=document.getElementById("q").value.trim();
  const list=document.getElementById("list");
  list.innerHTML="";
  setStatus("検索中");

  const res=await fetch(`${backend}/api/search?q=${encodeURIComponent(q)}`);
  const data=await res.json();
  const laws=data.laws||[];

  laws.slice(0,20).forEach(law=>{
    const title=law.revision_info?.law_title||law.current_revision_info?.law_title||"タイトル不明";
    const id=law.law_info?.law_id||law.law_info?.law_num||"";
    const li=document.createElement("li");
    li.textContent=`${title} [${id}]`;
    li.onclick=()=>loadLaw(id);
    list.appendChild(li);
  });

  setStatus("表示OK");
}

async function loadLaw(id){
  setStatus("本文取得中");
  const res=await fetch(`${backend}/api/law/${id}`);
  const data=await res.json();
  renderLaw(data);
  setStatus("表示OK");
}

function findArticles(obj){
  let results=[];
  if(!obj) return results;
  if(typeof obj==="object"){
    if(obj.tag==="Article") results.push(obj);
    for(const key in obj){
      const val=obj[key];
      if(typeof val==="object") results=results.concat(findArticles(val));
    }
  }
  return results;
}

function collectText(node){
  let text="";
  if(!node) return text;
  if(typeof node==="string") return node;
  if(Array.isArray(node.children)){
    node.children.forEach(c=>{
      if(typeof c==="string") text+=c;
      else text+=collectText(c);
    });
  }
  return text;
}

function renderLaw(data){
  const out=document.getElementById("out");
  const articles=findArticles(data);
  if(articles.length===0){ out.textContent="条文が見つかりません"; return; }

  let text="";
  articles.slice(0,200).forEach(article=>{
    const num=article.attr?.Num||"";
    text+="第"+num+"条\n";

    const caption=article.children?.find(x=>x.tag==="ArticleCaption");
    if(caption) text+="【"+collectText(caption)+"】\n";

    const paragraphs=article.children?.filter(x=>x.tag==="Paragraph")||[];
    paragraphs.forEach(p=>{
      const body=collectText(p);
      text+=body+"\n";
      const items=p.children?.filter(x=>x.tag==="Item")||[];
      items.forEach(i=>{ text+="  "+collectText(i)+"\n"; });
    });
    text+="\n";
  });

  out.textContent=text.trim();
}

// PWA：Service Worker登録
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
